# values.yaml — k8s-express-api Helm chart
# Generated by migration-harness for run-20260620-032937

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/scotiapoc-migration-demo/migration-demo/k8s-express-api
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: "k8s-express-api-example"

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: k8s-express-api.atlas-prod.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  PORT: "3001"
  # CRITICAL: GITHUB_API_URL and REDIS_DEFAULT_EXPIRATION have no defaults.
  # Must be injected via secret — see blocking prerequisites in migration-plan.md.

secretRef:
  name: k8s-express-api-secret
  keys:
    - GITHUB_API_URL
    - REDIS_DEFAULT_EXPIRATION
    - REDIS_HOST
    - REDIS_PORT

networkPolicy:
  ingress:
    enabled: true
  egress:
    enabled: true
    # Must allow egress to GITHUB_API_URL host on port 443

redis:
  # Redis must be provisioned separately before this chart is deployed.
  # See migration-plan.md Phase 1 — Environment Preparation.
  host: redis-master
  port: 6379

livenessProbe:
  httpGet:
    path: /livez
    port: 3001
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
