{{- if .Values.networkPolicy.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-express-api.fullname" . }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-express-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-express-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
